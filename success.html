<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peman Reyisi — DJ Innovations</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/logo.png">
    <style>
        .success-container {
            text-align: center;
            padding: 100px 20px;
        }
        .success-icon {
            font-size: 80px;
            color: var(--success);
            margin-bottom: 20px;
        }
        .order-summary {
            max-width: 500px;
            margin: 40px auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            text-align: left;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <img src="assets/logo.png" alt="DJ Innovations Logo" id="main-logo">
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="success-container">
            <div class="success-icon">✓</div>
            <h1>Peman an Reyisi!</h1>
            <p class="subtitle" id="main-success-message">Mèsi pou konfyans ou. Peman ou byen pase.</p>

            <div class="order-summary">
                <h3 style="margin-bottom: 20px;">Detay kòmand ou an:</h3>
                <p><strong>Sèvis:</strong> <span id="service-name">-</span></p>
                <p><strong>Freelancer:</strong> <span id="freelancer-name">DJ Innovations</span></p>
                <p><strong>Estati:</strong> <span style="color: var(--success)">Konfime</span></p>
                <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--border-color);">
                <p id="contact-notice">Freelancer w lan ap kontakte w nan <strong>24 a 48 èdtan</strong>.</p>
            </div>

            <a href="index.html" class="btn primary">Retounen nan Paj Akèy</a>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 DJ Innovations. Tout dwa rezève.</p>
    </footer>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const sessionId = params.get('session_id') || params.get('transactionId');
            
            if (!sessionId) return;

            // Wait for client to be ready (supabase.js injects window.supabaseClient)
            let tries = 0;
            while (!window.supabaseClient && tries < 40) {
                await new Promise(r => setTimeout(r, 100));
                tries++;
            }
            const sb = window.supabaseClient;
            if (!sb) {
                console.error('Supabase client pa prè — abòne.js pa chaje?');
                return;
            }

            try {
                // 1. Update statut = 'paye' directly (fallback, webhook does it too)
                await sb.from('reservations')
                    .update({ statut: 'paye' })
                    .or(`stripe_session_id.eq.${sessionId},id.eq.${sessionId}`);

                // 2. Fetch the reservation
                const { data: res, error } = await sb
                    .from('reservations')
                    .select('*')
                    .or(`stripe_session_id.eq.${sessionId},id.eq.${sessionId}`)
                    .maybeSingle();

                if (error) { console.error('Erè fetch rezèvasyon:', error); }
                    
                if (res) {
                    document.getElementById('main-success-message').innerText =
                        `Mèsi ${res.prenom || ''}! Peman ou pou sèvis la byen pase.`;

                    // Fetch service name
                    let serviceNom = 'Sèvis DJ Innovations';
                    if (res.service_ids && res.service_ids.length > 0) {
                        const { data: sData } = await sb.from('services').select('nom').eq('id', res.service_ids[0]).single();
                        if (sData) serviceNom = sData.nom;
                    }
                    document.getElementById('service-name').innerText = serviceNom;
                    document.getElementById('freelancer-name').innerText = res.freelancer_id ? 'Freelancer' : 'DJ Innovations';

                    // 3. Send confirmation email (once per session via localStorage guard)
                    const emailSentKey = 'email_sent_' + sessionId;
                    if (!localStorage.getItem(emailSentKey)) {
                        localStorage.setItem(emailSentKey, 'true');

                        console.log('Ap voye imèl konfirmasyon pou rezèvasyon:', res.id);

                        const { data: emailRes, error: emailErr } = await sb.functions.invoke(
                            'send-confirmation-email',
                            { body: { reservation_id: res.id } }
                        );

                        if (emailErr) {
                            console.error('Erè Edge Function imèl:', emailErr);
                        } else {
                            console.log('✅ Imèl voye ak siksè:', emailRes);
                        }
                    }
                }
            } catch(err) {
                console.error('Erreur de confirmation post-paiement:', err);
            }
        });
    </script>
</body>
</html>
