<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peman Reyisi — DJ Innovations</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .success-container {
            text-align: center;
            padding: 100px 20px;
        }
        .success-icon {
            font-size: 80px;
            color: var(--success);
            margin-bottom: 20px;
        }
        .order-summary {
            max-width: 500px;
            margin: 40px auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            text-align: left;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <img src="assets/logo.png" alt="DJ Innovations Logo" id="main-logo">
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="success-container">
            <div class="success-icon">✓</div>
            <h1>Peman an Reyisi!</h1>
            <p class="subtitle" id="main-success-message">Mèsi pou konfyans ou. Peman ou byen pase.</p>

            <div class="order-summary">
                <h3 style="margin-bottom: 20px;">Detay kòmand ou an:</h3>
                <p><strong>Sèvis:</strong> <span id="service-name">-</span></p>
                <p><strong>Freelancer:</strong> <span id="freelancer-name">DJ Innovations</span></p>
                <p><strong>Estati:</strong> <span style="color: var(--success)">Konfime</span></p>
                <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--border-color);">
                <p id="contact-notice">Freelancer w lan ap kontakte w nan <strong>24 a 48 èdtan</strong>.</p>
            </div>

            <a href="index.html" class="btn primary">Retounen nan Paj Akèy</a>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 DJ Innovations. Tout dwa rezève.</p>
    </footer>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            // It might be 'session_id' (Stripe) or 'transactionId'/'session_id' (MonCash/Bazik)
            const sessionId = params.get('session_id') || params.get('transactionId');
            
            if (sessionId) {
                try {
                    // 1. Confirmer la réservation via la fonction RPC (Contourne RLS)
                    await supabase.rpc('confirm_payment', { sess_id: sessionId });
                    
                    // 2. Récupérer la réservation (On cherche par id ou stripe_session_id)
                    let { data: res, error } = await supabase
                        .from('reservations')
                        .select('*')
                        .or(`stripe_session_id.eq.${sessionId},id.eq.${sessionId}`)
                        .single();
                        
                    if (res) {
                        document.getElementById('main-success-message').innerText = `Mèsi ${res.prenom || ''}! Peman ou pou sèvis la byen pase.`;
                        
                        // Si l'email n'a pas encore été envoyé localement pour cette session
                        const emailSentKey = 'email_sent_' + sessionId;
                        if (!localStorage.getItem(emailSentKey)) {
                            localStorage.setItem(emailSentKey, 'true');
                            
                            // Récupérer les infos du service (Séparé du select pour éviter l'erreur de relation)
                            let serviceNom = 'Sèvis DJ Innovations';
                            if (res.service_ids && res.service_ids.length > 0) {
                                const { data: sData } = await supabase.from('services').select('nom').eq('id', res.service_ids[0]).single();
                                if (sData) serviceNom = sData.nom;
                            }
                            document.getElementById('service-name').innerText = serviceNom;
                            
                            const fName = res.freelancer_id ? 'Freelancer' : 'DJ Innovations';
                            document.getElementById('freelancer-name').innerText = fName;
                            
                            // 3. Envoi du mail directement via Resend (Prototype Fallback)
                            const RESEND_API_KEY = "re_gpehKksn_68smWrTd4bV7z8NduDmCHX9R"; // Clé copiée depuis .env.local
                            let slotsHtml = '';
                            if (res.horaires && typeof res.horaires === 'object' && !Array.isArray(res.horaires)) {
                                Object.keys(res.horaires).forEach(key => {
                                    if(Array.isArray(res.horaires[key])) {
                                        slotsHtml += res.horaires[key].map(h => `<li>Kreno rezève: ${key.split('_')[1] || key} > ${h}</li>`).join('');
                                    }
                                });
                            } else if (Array.isArray(res.horaires)) {
                                slotsHtml = res.horaires.map(h => `<li>${h.date} à ${h.time}</li>`).join('');
                            }
                            
                            // Envoi au client
                            await fetch("https://api.resend.com/emails", {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${RESEND_API_KEY}` },
                                body: JSON.stringify({
                                    from: "DJ Innovations <info@djinnovations.com>",
                                    to: res.email,
                                    subject: `Fakti Elektwonik - ${serviceNom} — DJ Innovations`,
                                    html: `
                                      <div style="font-family: sans-serif; max-width: 600px; margin: auto; border: 1px solid #eee; padding: 20px;">
                                        <h2 style="color: #BA7517;">DJ Innovations</h2>
                                        <hr>
                                        <h1>Mèsi pou konfyans ou, ${res.prenom}!</h1>
                                        <p>Peman ou pou sèvis <strong>${serviceNom}</strong> an byen pase. Sa se fakti elektwonik ou.</p>
                                        <p><strong>Freelancer ou a ap kontakte w nan 24 a 48 èdtan pou kòmanse!</strong></p>
                                        <p><strong>Orè ou chwazi yo:</strong></p>
                                        <ul>${slotsHtml || '<li>Orè a pral konfime pa freelancer an.</li>'}</ul>
                                        <hr>
                                        <p style="font-size: 12px; color: #888;">© 2024 DJ Innovations. Tout dwa rezève.</p>
                                      </div>
                                    `
                                })
                            }).catch(console.error);
                        }
                    }
                } catch(err) {
                    console.error("Erreur de confirmation post-paiement:", err);
                }
            }
        });
    </script>
</body>
</html>
